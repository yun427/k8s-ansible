---
- name: 配置所有Kubernetes节点
  hosts: k8s_cluster
  become: yes
  roles:
    - common
    - docker
    - kube

- name: 初始化Master节点
  hosts: k8s_master
  become: yes
  roles:
    - master

- name: 加入Node节点
  hosts: k8s_nodes
  become: yes
  roles:
    - node

- name: 安装网络插件
  hosts: k8s_master
  become: yes
  roles:
    - flannel
  tasks:
    - name: 修改kube-proxy为iptables模式
      shell: |
        kubectl get cm kube-proxy -n kube-system -o yaml | sed 's/mode: ""/mode: "iptables"/' | kubectl apply -f -
        kubectl -n kube-system rollout restart daemonsets.apps kube-proxy