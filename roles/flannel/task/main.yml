---
- name: 创建flannel配置文件
  template:
    src: kube-flannel.yml.j2
    dest: /root/kube-flannel.yml

- name: 应用flannel配置
  command: "{{ kubectl_path.stdout }} apply -f /root/kube-flannel.yml"

- name: 检查flannel状态
  command: "{{ kubectl_path.stdout }} get pods -n kube-system -l app=flannel"
  register: flannel_result
  until: "'Running' in flannel_result.stdout"
  retries: 10
  delay: 10