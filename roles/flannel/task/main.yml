---
- name: 创建flannel配置文件
  template:
    src: kube-flannel.yml.j2
    dest: /root/kube-flannel.yml

- name: 应用flannel配置
  command: kubectl apply -f /root/kube-flannel.yml

- name: 检查flannel状态
  command: kubectl get pods -n kube-system -l app=flannel
  register: flannel_result
  until: flannel_result.stdout.find('Running') != -1
  retries: 10
  delay: 10