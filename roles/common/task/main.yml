- name: 检查是否为CentOS 7
  fail:
    msg: "仅支持CentOS 7"
  when: ansible_distribution != "CentOS" or ansible_distribution_major_version != "7"
- name: 关闭防火墙
  systemd:
    name: firewalld
    state: stopped
    enabled: no

- name: 清空iptables规则
  command: iptables -F

- name: 禁用SELinux
  selinux:
    state: disabled
  register: selinux_result
  changed_when: false

- name: 临时禁用SELinux
  command: setenforce 0
  when: selinux_result is changed

- name: 关闭swap分区
  shell: swapoff -a

- name: 永久禁用swap
  replace:
    path: /etc/fstab
    regexp: '^([^#].*swap.*)'
    replace: '# \1'

- name: 设置主机名
  hostname:
    name: "{{ hostvars[inventory_hostname].hostname }}"

- name: 配置hosts文件
  blockinfile:
    path: /etc/hosts
    block: |
      {% for entry in hosts_entries %}
      {{ entry }}
      {% endfor %}

- name: 加载内核模块
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - ip_vs
    - ip_vs_rr
    - ip_vs_wrr
    - ip_vs_sh
    - nf_conntrack_ipv4

- name: 配置内核参数
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
  notify: reload sysctl

- name: 确保br_netfilter模块加载
  modprobe:
    name: br_netfilter
    state: present